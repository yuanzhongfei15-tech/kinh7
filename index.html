<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业工具合集 - 在线工具箱</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-tools"></i>
                <span>工具合集</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link active">首页</a>
                <a href="qrcode.html" class="nav-link">二维码</a>
                <a href="compress.html" class="nav-link">图片压缩</a>
                <a href="convert.html" class="nav-link">格式转换</a>
                <a href="format.html" class="nav-link">代码格式化</a>
                <a href="convertor.html" class="nav-link">数据换算</a>
                <a href="color.html" class="nav-link">配色工具</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title">专业在线工具合集</h1>
                <p class="hero-subtitle">高效、安全、完全免费的在线工具集合</p>
            </div>
        </section>

        <section class="tools-section">
            <div class="container">
                <h2 class="section-title">常用工具</h2>
                <div class="tools-grid">
                    <a href="qrcode.html" class="tool-card">
                        <div class="tool-icon">
                            <i class="fas fa-qrcode"></i>
                        </div>
                        <h3 class="tool-title">二维码生成器</h3>
                        <p class="tool-desc">快速生成二维码，支持自定义样式和尺寸</p>
                        <div class="tool-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </a>

                    <a href="compress.html" class="tool-card">
                        <div class="tool-icon">
                            <i class="fas fa-compress-arrows-alt"></i>
                        </div>
                        <h3 class="tool-title">图片无损压缩</h3>
                        <p class="tool-desc">在线压缩图片，保持画质的同时减小文件大小</p>
                        <div class="tool-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </a>

                    <a href="convert.html" class="tool-card">
                        <div class="tool-icon">
                            <i class="fas fa-exchange-alt"></i>
                        </div>
                        <h3 class="tool-title">格式转换</h3>
                        <p class="tool-desc">支持多种图片格式之间的转换</p>
                        <div class="tool-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </a>

                    <a href="format.html" class="tool-card">
                        <div class="tool-icon">
                            <i class="fas fa-code"></i>
                        </div>
                        <h3 class="tool-title">代码格式化</h3>
                        <p class="tool-desc">美化代码，支持多种编程语言</p>
                        <div class="tool-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </a>

                    <a href="convertor.html" class="tool-card">
                        <div class="tool-icon">
                            <i class="fas fa-calculator"></i>
                        </div>
                        <h3 class="tool-title">数据换算</h3>
                        <p class="tool-desc">单位转换，包括长度、重量、温度等</p>
                        <div class="tool-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </a>

                    <a href="color.html" class="tool-card">
                        <div class="tool-icon">
                            <i class="fas fa-palette"></i>
                        </div>
                        <h3 class="tool-title">配色工具</h3>
                        <p class="tool-desc">生成配色方案，支持多种配色模式</p>
                        <div class="tool-arrow">
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 专业工具合集. 保留所有权利.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
