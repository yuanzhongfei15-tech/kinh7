<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>格式转换 - 专业工具合集</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <i class="fas fa-tools"></i>
                <span>工具合集</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="qrcode.html" class="nav-link">二维码</a>
                <a href="compress.html" class="nav-link">图片压缩</a>
                <a href="convert.html" class="nav-link active">格式转换</a>
                <a href="format.html" class="nav-link">代码格式化</a>
                <a href="convertor.html" class="nav-link">数据换算</a>
                <a href="color.html" class="nav-link">配色工具</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="tool-page">
            <div class="container">
                <div class="tool-header">
                    <h1><i class="fas fa-exchange-alt"></i> 图片格式转换</h1>
                    <p>支持多种图片格式之间的转换</p>
                </div>

                <div class="tool-container">
                    <div class="input-group">
                        <label for="convertImageInput">选择图片</label>
                        <input type="file" id="convertImageInput" accept="image/*">
                    </div>

                    <div class="input-group">
                        <label for="outputFormat">输出格式</label>
                        <select id="outputFormat">
                            <option value="jpeg">JPEG</option>
                            <option value="png">PNG</option>
                            <option value="webp">WebP</option>
                        </select>
                    </div>

                    <div style="margin-top: 24px;">
                        <button class="btn btn-primary" id="convertBtn">
                            <i class="fas fa-exchange-alt"></i> 转换格式
                        </button>
                        <button class="btn btn-success" id="downloadConvertedBtn" style="display: none;">
                            <i class="fas fa-download"></i> 下载图片
                        </button>
                    </div>

                    <div class="convert-preview" id="convertPreview" style="display: none;">
                        <div class="preview-box">
                            <h4>原图</h4>
                            <img id="convertOriginalImage" alt="原图">
                        </div>
                        <div class="preview-box">
                            <h4>转换后</h4>
                            <img id="convertResultImage" alt="转换后">
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 专业工具合集. 保留所有权利.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        let convertedDataUrl;

        document.getElementById('convertImageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('convertOriginalImage').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('convertBtn').addEventListener('click', function() {
            const file = document.getElementById('convertImageInput').files[0];
            if (!file) {
                alert('请先选择图片');
                return;
            }

            const format = document.getElementById('outputFormat').value;
            const mimeType = 'image/' + format;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    convertedDataUrl = canvas.toDataURL(mimeType, 0.95);
                    document.getElementById('convertResultImage').src = convertedDataUrl;

                    document.getElementById('convertPreview').style.display = 'grid';
                    document.getElementById('downloadConvertedBtn').style.display = 'inline-flex';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('downloadConvertedBtn').addEventListener('click', function() {
            if (convertedDataUrl) {
                const format = document.getElementById('outputFormat').value;
                const link = document.createElement('a');
                link.download = 'converted.' + format;
                link.href = convertedDataUrl;
                link.click();
            }
        });
    </script>
</body>
</html>
